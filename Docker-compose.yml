services:
  # The PostgreSQL Database Service
  postgres-db:
    image: postgres:15-alpine
    container_name: tm-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The Spring Boot Application Service
  app-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tm-app
    ports:
      - "8080:8080"
    depends_on:
      postgres-db:
        condition: service_healthy # Only starts app once DB is ready
    environment:
      # Database connection
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      # JWT Configuration
      APPLICATION_SECURITY_JWT_SECRET_KEY: ${JWT_SECRET}
      APPLICATION_SECURITY_JWT_EXPIRATION: ${JWT_EXPIRATION}

      # SMTP Configuration
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      # Profiles can help manage different settings
      SPRING_PROFILES_ACTIVE: docker
    restart: always

volumes:
  postgres_data: